<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>名刺管理システム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --bg:#F4F3EF;--card:#FFF;--accent:#2D6A4F;--accent-l:#E6F4ED;
  --accent2:#E76F51;--text:#1A1A1A;--text2:#5A5A5A;--text3:#AAA;
  --border:#E2E0D8;--border2:#C5C3BB;--r:12px;--rs:8px;
  --sh:0 2px 10px rgba(0,0,0,0.06);--shm:0 6px 28px rgba(0,0,0,0.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP','DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
input,select,textarea,button{font-family:inherit;font-size:13px;border-radius:var(--rs);outline:none}
input,select,textarea{border:1.5px solid var(--border);padding:8px 11px;width:100%;background:#fff;color:var(--text);transition:border-color 0.15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
button{cursor:pointer}
.screen{display:none}.screen.active{display:block}

/* 認証 */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:linear-gradient(135deg,#f4f3ef 0%,#e8f5ee 100%)}
.auth-card{background:#fff;border:1.5px solid var(--border);border-radius:18px;padding:2.25rem;width:100%;max-width:380px;box-shadow:var(--shm)}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.auth-icon{width:42px;height:42px;background:var(--accent);border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:21px}
.auth-name{font-size:19px;font-weight:700;letter-spacing:-0.3px}
.auth-sub{font-size:12px;color:var(--text2);margin-bottom:1.5rem;padding-left:52px;line-height:1.5}
.fl{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;margin-top:12px;font-weight:600}
.btn-login{width:100%;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:11px;font-size:14px;font-weight:700;margin-top:20px;transition:background 0.15s,transform 0.1s}
.btn-login:hover{background:#245c43;transform:translateY(-1px)}
.btn-login:active{transform:translateY(0)}
.auth-err{font-size:12px;color:#d94f4f;margin-top:10px;display:none;padding:8px 10px;background:#fff0f0;border-radius:6px;border:1px solid #ffcaca}
.auth-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:12px;line-height:1.4}

/* ヘッダー */
.hdr{background:#fff;border-bottom:1.5px solid var(--border);position:sticky;top:0;z-index:20;box-shadow:0 1px 8px rgba(0,0,0,0.04)}
.hdr-in{max-width:1100px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px}
.hdr-l{display:flex;align-items:center;gap:9px}
.hdr-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
.hdr-title{font-size:15px;font-weight:700;letter-spacing:-0.2px}
.hdr-badge{background:var(--accent-l);color:var(--accent);border-radius:99px;padding:2px 10px;font-size:11px;font-weight:700}
.hdr-r{display:flex;gap:7px;align-items:center}
.btn-add{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px;transition:background 0.15s}
.btn-add:hover{background:#245c43}
.btn-lo,.btn-exp{border:1.5px solid var(--border);background:#fff;color:var(--text2);border-radius:8px;padding:6px 11px;font-size:12px;display:flex;align-items:center;gap:4px}
.btn-lo:hover,.btn-exp:hover{background:var(--bg)}

/* 保存ステータス */
.save-status{font-size:11px;padding:3px 10px;border-radius:99px;display:flex;align-items:center;gap:4px}
.save-status.idle{color:var(--text3)}
.save-status.saving{color:#d97706;background:#fef3c7}
.save-status.ok{color:var(--accent);background:var(--accent-l)}
.save-status.err{color:#dc2626;background:#fee2e2}

/* ツールバー */
.tbar{max-width:1100px;margin:0 auto;padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap}
.sw{flex:1;min-width:160px;position:relative}
.sw i{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text3);pointer-events:none}
.sw input{padding-left:34px}
.fsel{font-size:12px;padding:7px 10px;border:1.5px solid var(--border);background:#fff;color:var(--text);border-radius:var(--rs)}
.fsel:focus{border-color:var(--accent)}

/* グリッド */
.gw{max-width:1100px;margin:0 auto;padding:4px 16px 40px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:14px}

/* カード */
.card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color 0.15s,box-shadow 0.15s,transform 0.15s;cursor:pointer}
.card:hover{border-color:var(--border2);box-shadow:var(--shm);transform:translateY(-2px)}
.card-img{width:100%;height:115px;object-fit:contain;display:block;background:#f8f7f3;padding:4px}
.card-img-ph{width:100%;height:115px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0ede6,#e8e4da);color:#ccc;font-size:32px}
.card-body{padding:11px 13px 9px}
.card-co-tag{display:inline-block;background:var(--accent-l);color:var(--accent);border-radius:99px;padding:2px 9px;font-size:10px;font-weight:700;margin-bottom:7px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-top{display:flex;align-items:flex-start;gap:9px}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.av0{background:#DBEAFE;color:#1E40AF}.av1{background:#D1FAE5;color:#065F46}
.av2{background:#FCE7F3;color:#9D174D}.av3{background:#FEF3C7;color:#92400E}
.av4{background:#EDE9FE;color:#5B21B6}.av5{background:#FEE2E2;color:#991B1B}
.ci{flex:1;min-width:0}
.cn{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.cr{font-size:11px;color:var(--text2);margin-bottom:4px}
.cdate{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px;margin-top:2px}
.card-acts{display:flex;gap:5px;padding:8px 11px;border-top:1.5px solid var(--bg);flex-wrap:wrap}
.bic{background:var(--bg);border:none;border-radius:6px;padding:5px 9px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:3px;color:var(--text2);font-weight:500;transition:background 0.12s}
.bic:hover{background:#e8e6df}
.bic.vi{color:var(--accent);background:var(--accent-l)}.bic.vi:hover{background:#c5e8d5}
.bic.del:hover{color:#dc2626;background:#fee2e2}

/* モーダル */
.mbg{position:fixed;inset:0;background:rgba(10,10,10,0.6);display:none;align-items:flex-start;justify-content:center;z-index:50;padding:1rem;overflow-y:auto;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.mbg.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:1.5rem;width:100%;max-width:540px;margin:auto;box-shadow:0 24px 64px rgba(0,0,0,0.22)}
.mhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1.5px solid var(--bg)}
.mtitle{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.mtitle i{color:var(--accent);font-size:18px}
.xbtn{background:var(--bg);border:none;width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:16px;transition:background 0.12s}
.xbtn:hover{background:#e5e3dc}

/* レスポンシブ */
@media(max-width:640px){
  .hdr-title{font-size:13px}
  .la{display:none}
  .btn-add,.btn-lo,.btn-exp{padding:7px 9px}
  .grid{grid-template-columns:1fr 1fr;gap:10px}
  .card-img,.card-img-ph{height:90px}
  .av{width:34px;height:34px;font-size:11px}
  .cn{font-size:12px}
  .modal{padding:1.25rem}
}
</style>
</head>
<body>

<script>
// =====================================================
// ★ 基本構成設定 (トークン以外)
// =====================================================
const CONFIG = {
  GITHUB_USER  : 'mgunshi3060',
  GITHUB_REPO  : 'meishi-app',
  GITHUB_TOKEN : '', // localStorageから動的に読み込み
  APP_PASSWORD : '321315',
  DATA_PATH    : 'data/cards.json',
  IMAGES_PATH  : 'images',
  BRANCH       : 'main',
};
</script>

<div id="authScreen" class="screen active">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-icon"><i class="ti ti-id-badge-2"></i></div>
        <span class="auth-name">名刺管理</span>
      </div>
      <div class="auth-sub">セキュリティのため認証が必要です</div>
      
      <label class="fl">GitHub Personal Access Token</label>
      <input type="password" id="ghTokenInput" placeholder="ghp_xxxxxxxxxxxx">
      <div class="auth-hint" style="text-align:left; margin-bottom:8px;">※トークンはブラウザ内にのみ保存されます</div>

      <label class="fl">ログインパスワード</label>
      <input type="password" id="pwInput" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')tryLogin()">
      
      <div class="auth-err" id="pwErr"></div>
      
      <button class="btn-login" onclick="tryLogin()">ログイン</button>
      <div class="auth-hint">トークン未発行の場合は、GitHubのSettingsから<br>repo権限を付与したトークンを作成してください。</div>
    </div>
  </div>
</div>

<div id="mainScreen" class="screen">
  <div class="hdr">
    <div class="hdr-in">
      <div class="hdr-l">
        <div class="hdr-icon"><i class="ti ti-id-badge-2"></i></div>
        <span class="hdr-title">名刺管理</span>
        <span class="hdr-badge" id="totalBadge">0件</span>
      </div>
      <div class="hdr-r">
        <div class="save-status idle" id="saveStatus"><i class="ti ti-cloud"></i><span class="la">待機中</span></div>
        <button class="btn-exp" onclick="exportJSON()" title="JSON出力"><i class="ti ti-download"></i><span class="la">出力</span></button>
        <button class="btn-add" onclick="openAdd()"><i class="ti ti-plus"></i><span class="la">追加</span></button>
        <button class="btn-lo" onclick="doLogout()"><i class="ti ti-logout"></i><span class="la">切断</span></button>
      </div>
    </div>
  </div>

  <div class="tbar">
    <div class="sw">
      <i class="ti ti-search"></i>
      <input type="search" placeholder="曖昧検索..." oninput="render()" id="q">
    </div>
    <select class="fsel" id="coFilter" onchange="render()"><option value="">すべての会社</option></select>
    <select class="fsel" id="sortF" onchange="render()">
      <option value="new">新着順</option>
      <option value="name">氏名順</option>
      <option value="co">会社順</option>
    </select>
  </div>

  <div class="gw"><div class="grid" id="grid"></div></div>
</div>

<div class="mbg" id="editModal">
  <div class="modal" style="max-width:500px;">
    <div class="mhd">
      <div class="mtitle" id="editTitle">名刺を登録</div>
      <button class="xbtn" onclick="closeMd('editModal')"><i class="ti ti-x"></i></button>
    </div>
    
    <div id="upZone" style="border:2px dashed var(--border); border-radius:12px; padding:20px; text-align:center; cursor:pointer; background:var(--bg); margin-bottom:15px;" onclick="document.getElementById('fileIn').click()">
       <i class="ti ti-photo-up" style="font-size:24px; color:var(--text3);"></i>
       <div style="font-size:12px; color:var(--text2); margin-top:5px;">画像を選択またはドラッグ</div>
    </div>
    <input type="file" id="fileIn" accept="image/*" style="display:none" onchange="handleImg(event)">
    
    <div id="prevWrap" style="display:none; position:relative; margin-bottom:15px;">
      <img id="prevImg" style="width:100%; border-radius:8px; border:1px solid var(--border);">
      <button class="xbtn" style="position:absolute; top:5px; right:5px; background:rgba(0,0,0,0.5); color:#fff;" onclick="clearImg()"><i class="ti ti-trash"></i></button>
    </div>

    <div style="display:grid; gap:10px;">
      <input id="f_co" placeholder="会社名（必須）">
      <input id="f_nm" placeholder="氏名（必須）">
      <input id="f_role" placeholder="役職">
      <input id="f_tel" placeholder="電話番号">
      <input id="f_email" placeholder="メールアドレス">
      <textarea id="f_memo" placeholder="メモ・備考" style="height:60px;"></textarea>
    </div>

    <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
      <button style="padding:8px 15px; border-radius:8px; border:1px solid var(--border); background:#fff;" onclick="closeMd('editModal')">キャンセル</button>
      <button id="saveBtn" style="padding:8px 20px; border-radius:8px; border:none; background:var(--accent); color:#fff; font-weight:bold;" onclick="saveCard()">保存する</button>
    </div>
  </div>
</div>

<script>
// =====================================================
// アプリ制御ロジック
// =====================================================
let cards = [];
let editId = null;
let imgB64 = null;

// GitHub API 通信
const ghHeaders = () => ({
  'Authorization': `token ${CONFIG.GITHUB_TOKEN}`,
  'Content-Type': 'application/json',
  'Accept': 'application/vnd.github.v3+json'
});

async function ghPut(path, content, isBase64=false){
  const url = `https://api.github.com/repos/${CONFIG.GITHUB_USER}/${CONFIG.GITHUB_REPO}/contents/${path}`;
  let sha = null;
  try {
    const r = await fetch(url, {headers: ghHeaders()});
    if(r.ok) { const d = await r.json(); sha = d.sha; }
  } catch(e){}

  const body = {
    message: `Update ${path}`,
    content: isBase64 ? content : btoa(unescape(encodeURIComponent(content))),
    branch: CONFIG.BRANCH
  };
  if(sha) body.sha = sha;

  const res = await fetch(url, { method: 'PUT', headers: ghHeaders(), body: JSON.stringify(body) });
  if(!res.ok) throw new Error('GitHub API Error');
  return res.json();
}

// 認証・初期化
window.onload = () => {
  const savedToken = localStorage.getItem('meishi_gh_token');
  if(savedToken) document.getElementById('ghTokenInput').value = savedToken;
};

async function tryLogin(){
  const token = document.getElementById('ghTokenInput').value.trim();
  const pass = document.getElementById('pwInput').value;
  const errEl = document.getElementById('pwErr');

  if(pass !== CONFIG.APP_PASSWORD){
    errEl.textContent = "パスワードが正しくありません。";
    errEl.style.display = "block";
    return;
  }
  if(!token.startsWith('ghp_')){
    errEl.textContent = "有効なGitHubトークンを入力してください。";
    errEl.style.display = "block";
    return;
  }

  CONFIG.GITHUB_TOKEN = token;
  localStorage.setItem('meishi_gh_token', token);
  
  showScr('mainScreen');
  setStatus('saving', 'データ取得中...');
  await loadData();
}

function doLogout(){
  document.getElementById('pwInput').value = '';
  showScr('authScreen');
}

// データ処理
async function loadData(){
  try {
    const url = `https://raw.githubusercontent.com/${CONFIG.GITHUB_USER}/${CONFIG.GITHUB_REPO}/${CONFIG.BRANCH}/${CONFIG.DATA_PATH}?t=${Date.now()}`;
    const r = await fetch(url);
    if(r.ok) cards = await r.json();
    setStatus('ok', '同期済み');
    render();
  } catch(e){
    setStatus('err', '読込失敗');
  }
}

async function saveCard(){
  const co = document.getElementById('f_co').value.trim();
  const nm = document.getElementById('f_nm').value.trim();
  if(!co || !nm) { alert('会社名と氏名は必須です'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true; setStatus('saving', '保存中...');

  const id = editId || Date.now().toString(36);
  let finalImg = null;

  // 画像アップロード処理
  if(imgB64 && imgB64.startsWith('data:')){
    const ext = imgB64.split(';')[0].split('/')[1] || 'jpg';
    const path = `${CONFIG.IMAGES_PATH}/img_${id}.${ext}`;
    await ghPut(path, imgB64.split(',')[1], true);
    finalImg = `https://${CONFIG.GITHUB_USER}.github.io/${CONFIG.GITHUB_REPO}/${path}`;
  } else if(editId){
    finalImg = cards.find(c=>c.id===editId)?.img;
  }

  const newCard = {
    id, company: co, name: nm,
    role: document.getElementById('f_role').value,
    tel: document.getElementById('f_tel').value,
    email: document.getElementById('f_email').value,
    memo: document.getElementById('f_memo').value,
    img: finalImg,
    updated: new Date().toLocaleDateString()
  };

  if(editId){
    const idx = cards.findIndex(c=>c.id===editId);
    cards[idx] = newCard;
  } else {
    cards.unshift(newCard);
  }

  try {
    await ghPut(CONFIG.DATA_PATH, JSON.stringify(cards, null, 2));
    setStatus('ok', '保存完了');
    closeMd('editModal');
    render();
  } catch(e){
    setStatus('err', '保存失敗');
  } finally {
    btn.disabled = false;
  }
}

function delCard(id){
  if(!confirm('削除してよろしいですか？')) return;
  cards = cards.filter(c=>c.id!==id);
  ghPut(CONFIG.DATA_PATH, JSON.stringify(cards, null, 2)).then(()=>render());
}

// UI描画
function render(){
  const q = document.getElementById('q').value.toLowerCase();
  const list = cards.filter(c => 
    c.name.toLowerCase().includes(q) || c.company.toLowerCase().includes(q)
  );

  document.getElementById('totalBadge').textContent = `${cards.length}件`;
  const grid = document.getElementById('grid');
  grid.innerHTML = list.map(c => `
    <div class="card" onclick="openEdit('${c.id}')">
      ${c.img ? `<img src="${c.img}" class="card-img">` : `<div class="card-img-ph"><i class="ti ti-id-badge-2"></i></div>`}
      <div class="card-body">
        <div class="card-co-tag">${c.company}</div>
        <div class="card-top">
          <div class="av av0">${c.name[0]}</div>
          <div class="ci">
            <div class="cn">${c.name}</div>
            <div class="cr">${c.role || ''}</div>
          </div>
        </div>
      </div>
      <div class="card-acts">
        <button class="bic del" onclick="event.stopPropagation();delCard('${c.id}')"><i class="ti ti-trash"></i> 削除</button>
      </div>
    </div>
  `).join('');
}

// ユーティリティ
function showScr(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function openMd(id){ document.getElementById(id).classList.add('open'); }
function closeMd(id){ document.getElementById(id).classList.remove('open'); }
function setStatus(cls, txt){
  const el = document.getElementById('saveStatus');
  el.className = `save-status ${cls}`;
  el.innerHTML = `<i class="ti ti-cloud"></i><span class="la">${txt}</span>`;
}

function handleImg(e){
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = (ev) => {
    imgB64 = ev.target.result;
    document.getElementById('prevImg').src = imgB64;
    document.getElementById('prevWrap').style.display = 'block';
    document.getElementById('upZone').style.display = 'none';
  };
  reader.readAsDataURL(file);
}
function clearImg(){
  imgB64 = null;
  document.getElementById('prevWrap').style.display = 'none';
  document.getElementById('upZone').style.display = 'block';
}

function openAdd(){
  editId = null; imgB64 = null;
  ['f_co','f_nm','f_role','f_tel','f_email','f_memo'].forEach(id=>document.getElementById(id).value='');
  clearImg();
  openMd('editModal');
}

function openEdit(id){
  editId = id;
  const c = cards.find(x=>x.id===id);
  document.getElementById('f_co').value = c.company;
  document.getElementById('f_nm').value = c.name;
  document.getElementById('f_role').value = c.role;
  document.getElementById('f_tel').value = c.tel;
  document.getElementById('f_email').value = c.email;
  document.getElementById('f_memo').value = c.memo;
  if(c.img){
    imgB64 = c.img;
    document.getElementById('prevImg').src = c.img;
    document.getElementById('prevWrap').style.display = 'block';
    document.getElementById('upZone').style.display = 'none';
  } else {
    clearImg();
  }
  openMd('editModal');
}

function exportJSON(){
  const blob = new Blob([JSON.stringify(cards, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'meishi_backup.json'; a.click();
}
</script>
</body>
</html>
